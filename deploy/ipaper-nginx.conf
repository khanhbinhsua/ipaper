# ============================================================
#  Server block cho iPaper — chạy chung anonmed-nginx
#  Copy file này lên VPS: /root/anonmed/docker/nginx/conf.d/ipaper.conf
#  (KHÔNG đụng tới safeandsoul.com — 2 app độc lập)
#  Đổi "ipaper.vitaliahmd.com" nếu dùng domain khác.
# ============================================================

# HTTP :80 — phục vụ ACME challenge (xin SSL) + chuyển hướng sang HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name ipaper.vitaliahmd.com;

    # Cho certbot xác thực domain
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS :443
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ipaper.vitaliahmd.com;

    ssl_certificate     /etc/letsencrypt/live/ipaper.vitaliahmd.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ipaper.vitaliahmd.com/privkey.pem;

    client_max_body_size 30M;   # cho phép upload file tới ~25MB

    # API REST -> backend
    location /api/ {
        proxy_pass http://ipaper_backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (thông báo realtime) -> backend
    location /socket.io/ {
        proxy_pass http://ipaper_backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # File (presigned URL) -> MinIO. Giữ nguyên path /ipaper-files/<key>
    location /ipaper-files/ {
        proxy_pass http://ipaper_minio:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Còn lại -> frontend (React SPA)
    location / {
        proxy_pass http://ipaper_frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
