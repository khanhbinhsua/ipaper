server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA: mọi route trả về index.html (React Router xử lý)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache asset tĩnh
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
